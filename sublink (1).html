<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubLink — School Substitute Management</title>
<style>
:root{
  --bg:#f5f4f0;--card:#fff;--card2:#f0efe9;--border:rgba(0,0,0,.09);--borderMid:rgba(0,0,0,.16);
  --text:#1a1a18;--text2:#5f5e5a;--text3:#9c9a92;
  --blue:#2563eb;--blueBg:#eff6ff;--blueBorder:#bfdbfe;
  --red:#dc2626;--redBg:#fef2f2;--redBorder:#fecaca;
  --orange:#ea580c;--orangeBg:#fff7ed;--orangeBorder:#fed7aa;
  --green:#16a34a;--greenBg:#f0fdf4;--greenBorder:#bbf7d0;
  --purple:#7c3aed;--purpleBg:#f5f3ff;--purpleBorder:#ddd6fe;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-logo{font-size:18px;font-weight:800;}
.topbar-logo span{color:var(--blue);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-user{font-size:13px;font-weight:600;color:var(--text2);}
.topbar-btn{font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;}
.topbar-btn:hover{background:var(--bg);}
.main{flex:1;padding:24px;max-width:1200px;margin:0 auto;width:100%;}
/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:420px;}
.login-logo{font-size:26px;font-weight:800;margin-bottom:4px;}
.login-logo span{color:var(--blue);}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.role-card{border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;background:transparent;text-align:left;}
.role-card:hover,.role-card.selected{border-color:var(--blue);background:var(--blueBg);}
.role-card-icon{font-size:20px;margin-bottom:6px;}
.role-card-name{font-size:13px;font-weight:700;}
.role-card-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.teacher-select{width:100%;height:44px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0 12px;font-size:14px;color:var(--text);margin-bottom:14px;font-family:inherit;}
.login-btn{width:100%;height:46px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.login-btn:hover{opacity:.9;}
/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap;}
.tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;}
.tab.active{background:var(--blue);color:#fff;border-color:transparent;}
.tab:hover:not(.active){background:var(--card);}
/* Section */
.section-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.section-sub{font-size:13px;color:var(--text2);margin-bottom:18px;}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin:18px 0 10px;}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.card-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.card-sub{font-size:12.5px;color:var(--text2);}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{opacity:.9;}
.btn-danger{background:var(--red);color:#fff;}
.btn-success{background:var(--green);color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-outline:hover{background:var(--bg);}
.btn-orange{background:var(--orange);color:#fff;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-block{width:100%;height:44px;}
/* Badges */
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;}
.badge-pending{background:var(--orangeBg);color:var(--orange);}
.badge-approved{background:var(--greenBg);color:var(--green);}
.badge-rejected{background:var(--redBg);color:var(--red);}
.badge-absent{background:var(--redBg);color:var(--red);}
.badge-present{background:var(--greenBg);color:var(--green);}
.badge-confirmed{background:var(--greenBg);color:var(--green);}
/* Timetable */
.timetable{width:100%;border-collapse:collapse;margin-bottom:16px;}
.timetable th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);padding:8px 6px;text-align:left;border-bottom:1px solid var(--border);}
.timetable td{padding:4px;}
.period-cell{border-radius:8px;padding:8px 10px;font-size:12px;cursor:pointer;transition:transform .1s;}
.period-cell:hover{transform:scale(1.02);}
.period-cell:active{transform:scale(.97);}
.period-own{background:var(--blueBg);border:1px solid var(--blueBorder);color:var(--blue);}
.period-sub{background:var(--redBg);border:1px solid var(--redBorder);color:var(--red);}
.period-free{background:var(--orangeBg);border:1px solid var(--orangeBorder);color:var(--orange);}
.period-empty{background:var(--card2);border:1px solid var(--border);color:var(--text3);}
.period-break{background:#f8f8f6;border:1px dashed var(--border);color:var(--text3);cursor:default;}
.period-label{font-weight:700;font-size:11.5px;}
.period-detail{font-size:10.5px;margin-top:2px;opacity:.85;}
.period-confirmed{outline:2px solid var(--green);outline-offset:1px;}
.period-num{font-size:10.5px;font-weight:700;color:var(--text3);padding:4px 8px 4px 0;white-space:nowrap;vertical-align:middle;}
/* Legend */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.legend-dot{width:10px;height:10px;border-radius:3px;}
/* Form */
.field{margin-bottom:14px;}
.field label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;height:42px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0 12px;font-size:14px;color:var(--text);font-family:inherit;}
.field textarea{height:80px;padding-top:10px;resize:none;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.modal{background:var(--card);border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
/* Overview table */
.overview-table{width:100%;border-collapse:collapse;}
.overview-table th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);padding:10px 12px;text-align:left;border-bottom:2px solid var(--border);}
.overview-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.overview-table tr:hover td{background:var(--bg);}
/* Stats */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
.stat-val{font-size:28px;font-weight:800;margin-bottom:2px;}
.stat-label{font-size:12px;color:var(--text2);}
/* Sub load bar */
.load-bar-wrap{height:6px;background:var(--border);border-radius:3px;margin-top:4px;}
.load-bar{height:6px;border-radius:3px;transition:width .3s;}
/* Misc */
.divider{height:1px;background:var(--border);margin:14px 0;}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;}
.notif-dot{width:7px;height:7px;background:var(--red);border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:1000;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.absent-banner{background:var(--redBg);border:1px solid var(--redBorder);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--red);font-weight:600;}
.match-score{font-size:10.5px;font-weight:700;padding:2px 6px;border-radius:4px;}
.match-high{background:var(--greenBg);color:var(--green);}
.match-mid{background:var(--orangeBg);color:var(--orange);}
.match-low{background:var(--redBg);color:var(--red);}
.lesson-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;}
.lesson-block-title{font-size:12.5px;font-weight:700;margin-bottom:8px;}
.lesson-field{margin-bottom:8px;}
.lesson-field label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;}
.lesson-field input,.lesson-field textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;color:var(--text);}
.lesson-field textarea{height:70px;resize:none;}
.lesson-field input:focus,.lesson-field textarea:focus{outline:none;border-color:var(--blue);}
.plan-complete{border-color:var(--green)!important;}
.plan-incomplete{border-color:var(--orange)!important;}
.csv-area{width:100%;height:160px;background:var(--bg);border:1.5px dashed var(--border);border-radius:10px;padding:12px;font-size:12px;font-family:monospace;color:var(--text);resize:vertical;}
.csv-area:focus{outline:none;border-color:var(--blue);}
@media(max-width:700px){
  .grid-3{grid-template-columns:1fr 1fr;}
  .grid-2{grid-template-columns:1fr;}
  .main{padding:14px;}
  .timetable th:nth-child(n+5),.timetable td:nth-child(n+5){display:none;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════
const DAYS=['Mon','Tue','Wed','Thu','Fri'];
const PERIODS=[1,2,3,4,5,6,7];
const PERIOD_TIMES=['8:00–8:50','8:50–9:40','9:40–10:30','10:30–11:20','11:20–12:10','12:10–13:00','13:00–13:50'];
const BREAK_AFTER=3; // break shown between P3 and P4

// Subject similarity groups for dispatch scoring
const SUBJECT_GROUPS={
  'Mathematics':['Mathematics','Physics','Chemistry'],
  'Science':['Science','Biology','Chemistry','Physics'],
  'Physics':['Physics','Mathematics','Science','Chemistry'],
  'Chemistry':['Chemistry','Science','Physics','Biology'],
  'Biology':['Biology','Science','Chemistry'],
  'English':['English','Arabic'],
  'Arabic':['Arabic','English'],
  'History':['History','Geography','Social Studies'],
  'Geography':['Geography','History','Social Studies'],
  'PE':['PE'],
  'Art':['Art'],
  'Music':['Music'],
};

// ═══════════════════════════════════
//  SEED DATA — loaded from localStorage or defaults
// ═══════════════════════════════════
function defaultTeachers(){
  return [
    {id:1,name:'Ms. Sarah Ahmed',  subject:'Mathematics',color:'#2563eb'},
    {id:2,name:'Mr. Omar Hassan',  subject:'Science',    color:'#7c3aed'},
    {id:3,name:'Ms. Nour El-Din',  subject:'English',    color:'#0891b2'},
    {id:4,name:'Mr. Karim Farouk', subject:'History',    color:'#059669'},
    {id:5,name:'Ms. Dina Mostafa', subject:'Arabic',     color:'#d97706'},
    {id:6,name:'Mr. Tarek Ibrahim',subject:'Physics',    color:'#db2777'},
    {id:7,name:'Ms. Layla Nasser', subject:'Chemistry',  color:'#65a30d'},
    {id:8,name:'Mr. Amir Saad',    subject:'PE',         color:'#ea580c'},
  ];
}

function defaultTimetable(teachers){
  const tt={};
  const grades=['Grade 6','Grade 7','Grade 8','Grade 9','Grade 10'];
  const rooms=['101','102','103','104','105','106','107','108'];
  teachers.forEach(t=>{
    tt[t.id]={};
    DAYS.forEach(day=>{
      tt[t.id][day]={};
      PERIODS.forEach(p=>{
        const seed=(t.id*7+p*3+DAYS.indexOf(day)*11)%10;
        if(seed<5){
          tt[t.id][day][p]={type:'own',class:grades[(t.id+p)%grades.length],room:rooms[(t.id*p)%rooms.length],subject:t.subject,lessonPlan:null};
        } else {
          tt[t.id][day][p]={type:'free'};
        }
      });
    });
  });
  return tt;
}

function defaultSubAssignments(){
  return {
    1:[{id:'sa1',day:'Mon',period:3,absentTeacherId:2,absentTeacher:'Mr. Omar Hassan',class:'Grade 8',subject:'Science',room:'102',confirmed:false,
      lessonPlan:{tasks:'Complete Chapter 5 exercises on pages 87-90. Work in pairs.',materials:'Textbook, answer key on desk.',homework:'Collect worksheets at end of period.'}}],
    3:[{id:'sa2',day:'Tue',period:6,absentTeacherId:6,absentTeacher:'Mr. Tarek Ibrahim',class:'Grade 10',subject:'Physics',room:'106',confirmed:false,
      lessonPlan:{tasks:'Revision for upcoming test using revision sheets.',materials:'Students have their own sheets.',homework:'Collect sheets at end — DO NOT let them take home.'}}],
  };
}

function defaultAbsenceRequests(){
  return [
    {id:1,teacherId:2,teacherName:'Mr. Omar Hassan',reason:'Medical appointment',status:'approved',periods:[3,4],day:'Mon',multiDay:false,lessonPlansAttached:true},
    {id:2,teacherId:6,teacherName:'Mr. Tarek Ibrahim',reason:'Family emergency',status:'approved',periods:[6],day:'Tue',multiDay:false,lessonPlansAttached:true},
    {id:3,teacherId:5,teacherName:'Ms. Dina Mostafa',reason:'Training workshop',status:'pending',periods:[1,2,3],day:'Wed',multiDay:false,lessonPlansAttached:false},
  ];
}

function defaultSubRequests(){
  return {1:[{id:101,day:'Mon',period:3,absentTeacherId:2,absentTeacher:'Mr. Omar Hassan',class:'Grade 8',subject:'Science',room:'102',status:'pending',lessonPlan:{tasks:'Complete Chapter 5 exercises on pages 87-90.',materials:'Textbook',homework:'Collect worksheets.'}}]};
}

// ═══════════════════════════════════
//  PERSISTENCE (localStorage)
// ═══════════════════════════════════
const LS_KEY='sublink_v3';

function loadData(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw) return JSON.parse(raw);
  } catch(e){}
  return null;
}

function saveData(){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify({
      teachers:DB.teachers,
      timetable:DB.timetable,
      subAssignments:DB.subAssignments,
      absenceRequests:DB.absenceRequests,
      subRequests:DB.subRequests,
      absenceIdCounter:DB.absenceIdCounter,
      subReqIdCounter:DB.subReqIdCounter,
      subAssignIdCounter:DB.subAssignIdCounter,
    }));
  } catch(e){}
}

function initDB(){
  const saved=loadData();
  if(saved){
    return {
      teachers:saved.teachers||defaultTeachers(),
      timetable:saved.timetable||defaultTimetable(saved.teachers||defaultTeachers()),
      subAssignments:saved.subAssignments||defaultSubAssignments(),
      absenceRequests:saved.absenceRequests||defaultAbsenceRequests(),
      subRequests:saved.subRequests||defaultSubRequests(),
      absenceIdCounter:saved.absenceIdCounter||10,
      subReqIdCounter:saved.subReqIdCounter||200,
      subAssignIdCounter:saved.subAssignIdCounter||100,
    };
  }
  const teachers=defaultTeachers();
  return {
    teachers,
    timetable:defaultTimetable(teachers),
    subAssignments:defaultSubAssignments(),
    absenceRequests:defaultAbsenceRequests(),
    subRequests:defaultSubRequests(),
    absenceIdCounter:10,
    subReqIdCounter:200,
    subAssignIdCounter:100,
  };
}

let DB=initDB();

// ═══════════════════════════════════
//  UI STATE
// ═══════════════════════════════════
let S={
  loggedIn:false,role:'teacher',teacherId:null,
  activeTab:'',modal:null,
  absDay:'Mon',absPeriods:[],absReason:'',absMultiDay:false,absEndDay:'Mon',
  lessonDraft:{},  // {period: {tasks,materials,homework}}
  csvText:'',
};

// ═══════════════════════════════════
//  HELPERS
// ═══════════════════════════════════
const teacher=id=>DB.teachers.find(t=>t.id===id);
const me=()=>teacher(S.teacherId);
const getCell=(tid,day,p)=>(DB.timetable[tid]||{})[day]?.[p]||{type:'free'};
const save=()=>{ saveData(); };

function subLoadCount(tid){
  return Object.values(DB.subAssignments).flat().filter(s=>s.absentTeacherId!==tid).length +
    Object.values(DB.subAssignments).flatMap(arr=>arr).filter(s=>
      Object.keys(DB.subAssignments).map(Number).includes(tid) &&
      DB.subAssignments[tid] && DB.subAssignments[tid].some(x=>x.id===s.id)
    ).length;
}
function mySubCount(tid){
  return (DB.subAssignments[tid]||[]).length;
}

function matchScore(freeTeacher,absentSubject){
  const group=SUBJECT_GROUPS[absentSubject]||[];
  if(freeTeacher.subject===absentSubject) return {score:3,label:'Perfect match',cls:'match-high'};
  if(group.includes(freeTeacher.subject)) return {score:2,label:'Related subject',cls:'match-mid'};
  return {score:1,label:'Any subject',cls:'match-low'};
}

function freeTeachersForSlot(day,period,excludeId){
  return DB.teachers
    .filter(t=>{
      if(t.id===excludeId) return false;
      const absent=DB.absenceRequests.find(r=>r.status==='approved'&&r.teacherId===t.id&&r.day===day&&r.periods.includes(period));
      if(absent) return false;
      return getCell(t.id,day,period).type==='free';
    })
    .sort((a,b)=>{
      // sort by match score desc, then by sub load asc (fairness)
      const scoreA=matchScore(a,'__').score;
      const scoreB=matchScore(b,'__').score;
      const loadA=mySubCount(a.id);
      const loadB=mySubCount(b.id);
      return loadA-loadB;
    });
}

function absentTeachersToday(){
  return DB.absenceRequests.filter(r=>r.status==='approved');
}

function toast(msg,type='default'){
  const el=document.createElement('div');
  el.className='toast';
  el.style.background=type==='success'?'#16a34a':type==='error'?'#dc2626':'#1a1a18';
  el.textContent=msg;
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},2600);
}

function closeModal(){S.modal=null;render();}

// ═══════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════
function render(){
  const app=document.getElementById('app');
  if(!S.loggedIn){app.innerHTML=renderLogin();bindLogin();return;}
  app.innerHTML=renderShell();
  bindShell();
  if(S.modal) attachModal();
}

// ── LOGIN ──
function renderLogin(){
  return `<div class="login-wrap"><div class="login-card">
    <div class="login-logo">Sub<span>Link</span></div>
    <div class="login-sub">School substitute management · v2</div>
    <div class="role-grid">
      <div class="role-card${S.role==='teacher'?' selected':''}" id="roleTeacher">
        <div class="role-card-icon">👩‍🏫</div>
        <div class="role-card-name">Teacher</div>
        <div class="role-card-sub">Schedule & subs</div>
      </div>
      <div class="role-card${S.role==='admin'?' selected':''}" id="roleAdmin">
        <div class="role-card-icon">🏫</div>
        <div class="role-card-name">Admin</div>
        <div class="role-card-sub">Manage all teachers</div>
      </div>
    </div>
    ${S.role==='teacher'?`<select class="teacher-select" id="teacherSel">
      <option value="">Select your name...</option>
      ${DB.teachers.map(t=>`<option value="${t.id}">${t.name} — ${t.subject}</option>`).join('')}
    </select>`:''}
    <button class="login-btn" id="loginBtn">Sign In →</button>
  </div></div>`;
}
function bindLogin(){
  document.getElementById('roleTeacher').onclick=()=>{S.role='teacher';render();};
  document.getElementById('roleAdmin').onclick=()=>{S.role='admin';render();};
  if(S.role==='teacher'){
    const sel=document.getElementById('teacherSel');
    if(sel) sel.onchange=e=>S.teacherId=Number(e.target.value);
  }
  document.getElementById('loginBtn').onclick=()=>{
    if(S.role==='teacher'&&!S.teacherId){toast('Select your name','error');return;}
    S.loggedIn=true;
    S.activeTab=S.role==='teacher'?'schedule':'dashboard';
    render();
  };
}

// ── SHELL ──
function renderShell(){
  const pendingSubs=S.role==='teacher'?((DB.subRequests[S.teacherId]||[]).filter(r=>r.status==='pending').length):0;
  const pendingAbs=S.role==='admin'?DB.absenceRequests.filter(r=>r.status==='pending').length:0;
  return `<div class="app">
    <div class="topbar">
      <div class="topbar-logo">Sub<span>Link</span></div>
      <div class="topbar-right">
        <span class="topbar-user">${S.role==='admin'?'Admin':me().name}</span>
        <button class="topbar-btn" id="logoutBtn">Sign out</button>
      </div>
    </div>
    <div class="main">
      <div class="tabs">
        ${S.role==='teacher'?`
          <button class="tab${S.activeTab==='schedule'?' active':''}" data-tab="schedule">My Schedule</button>
          <button class="tab${S.activeTab==='subs'?' active':''}" data-tab="subs">Sub Requests${pendingSubs?'<span class="notif-dot"></span>':''}</button>
          <button class="tab${S.activeTab==='absence'?' active':''}" data-tab="absence">Request Absence</button>
        `:`
          <button class="tab${S.activeTab==='dashboard'?' active':''}" data-tab="dashboard">Dashboard</button>
          <button class="tab${S.activeTab==='overview'?' active':''}" data-tab="overview">All Teachers</button>
          <button class="tab${S.activeTab==='absences'?' active':''}" data-tab="absences">Absences${pendingAbs?'<span class="notif-dot"></span>':''}</button>
          <button class="tab${S.activeTab==='dispatch'?' active':''}" data-tab="dispatch">Dispatch Subs</button>
          <button class="tab${S.activeTab==='import'?' active':''}" data-tab="import">Import Timetable</button>
        `}
      </div>
      <div id="tabContent">${renderTab()}</div>
    </div>
  </div>`;
}
function bindShell(){
  document.getElementById('logoutBtn').onclick=()=>{S.loggedIn=false;S.role='teacher';S.teacherId=null;render();};
  document.querySelectorAll('.tab[data-tab]').forEach(el=>el.onclick=()=>{S.activeTab=el.dataset.tab;render();});
  document.querySelectorAll('[data-action]').forEach(el=>el.onclick=e=>{e.stopPropagation();handleAction(el.dataset.action,el.dataset,el);});
  bindForms();
}
function renderTab(){
  const map={schedule:renderSchedule,subs:renderSubs,absence:renderAbsence,dashboard:renderDashboard,overview:renderOverview,absences:renderAbsences,dispatch:renderDispatch,import:renderImport};
  return (map[S.activeTab]||renderSchedule)();
}

// ═══════════════════════════════════
//  TEACHER — SCHEDULE
// ═══════════════════════════════════
function renderTimetable(tid,interactive){
  const mySubs=DB.subAssignments[tid]||[];
  const subMap={};
  mySubs.forEach(s=>subMap[`${s.day}-${s.period}`]=s);

  const absentToday=absentTeachersToday().map(r=>({...r,teacher:teacher(r.teacherId)}));

  let rows='';
  PERIODS.forEach((p,pi)=>{
    if(p===BREAK_AFTER+1){
      rows+=`<tr><td class="period-num" style="font-size:10px;color:var(--text3);">Break</td>${DAYS.map(()=>`<td><div class="period-cell period-break"><div class="period-label" style="text-align:center;">☕ 20 min</div></div></td>`).join('')}</tr>`;
    }
    rows+=`<tr>
      <td class="period-num">P${p}<br><span style="font-size:9.5px;font-weight:400;color:var(--text3);">${PERIOD_TIMES[pi]}</span></td>
      ${DAYS.map(day=>{
        const sub=subMap[`${day}-${p}`];
        if(sub){
          const confirmed=sub.confirmed;
          return `<td><div class="period-cell period-sub${confirmed?' period-confirmed':''}"${interactive?` data-action="viewSubLesson" data-day="${day}" data-period="${p}" data-tid="${tid}"`:''}">
            <div class="period-label">SUB${confirmed?' ✓':''}</div>
            <div class="period-detail">${sub.subject}</div>
            <div class="period-detail">${sub.class} Rm ${sub.room}</div>
            ${interactive&&!confirmed?'<div style="font-size:9.5px;margin-top:3px;">📋 tap to view</div>':''}
          </div></td>`;
        }
        const cell=getCell(tid,day,p);
        if(cell.type==='own'){
          const hasLesson=cell.lessonPlan&&Object.values(cell.lessonPlan).some(v=>v&&v.trim());
          return `<td><div class="period-cell period-own"${interactive?` data-action="editLesson" data-day="${day}" data-period="${p}" data-tid="${tid}"`:''}">
            <div class="period-label">${cell.subject}</div>
            <div class="period-detail">${cell.class}</div>
            <div class="period-detail">Rm ${cell.room}</div>
            ${interactive?`<div style="font-size:9.5px;margin-top:3px;">${hasLesson?'✅ lesson saved':'📝 add lesson'}</div>`:''}
          </div></td>`;
        }
        if(cell.type==='free'){
          return `<td><div class="period-cell period-free">
            <div class="period-label">Free</div>
          </div></td>`;
        }
        return `<td><div class="period-cell period-empty"><div class="period-label">—</div></div></td>`;
      }).join('')}
    </tr>`;
  });

  return `
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Own class</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Subbing</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>Free</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green);width:10px;height:10px;border-radius:3px;"></div>Sub confirmed</div>
    </div>
    <div style="overflow-x:auto;">
    <table class="timetable">
      <thead><tr><th>Period</th>${DAYS.map(d=>`<th>${d}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>`;
}

function renderSchedule(){
  const t=me();
  const absentToday=absentTeachersToday();
  const absentBanner=absentToday.length?`<div class="absent-banner">⚠ Absent today: ${absentToday.map(r=>r.teacherName).join(', ')}</div>`:'';
  return `
    <div class="section-title">My Schedule — ${t.name}</div>
    <div class="section-sub">${t.subject}</div>
    ${absentBanner}
    ${renderTimetable(S.teacherId,true)}

function renderDispatch(){
  const approved=DB.absenceRequests.filter(r=>r.status==='approved');
  if(!approved.length) return `<div class="section-title">Dispatch Substitutes</div><div class="empty">No approved absences to dispatch for.</div>`;

  return `
    <div class="section-title">Dispatch Substitutes</div>
    <div class="section-sub">For each absent teacher's class period, page an available free teacher. Teachers are sorted by subject match and lowest sub load.</div>
    ${approved.flatMap(absence=>
      absence.periods.map(period=>{
        const abTeacher=teacher(absence.teacherId);
        const cell=getCell(absence.teacherId,absence.day,period);
        const freeList=freeTeachersForSlot(absence.day,period,absence.teacherId);
        const alreadyDispatched=
          Object.entries(DB.subRequests).some(([tid,reqs])=>reqs.some(r=>r.day===absence.day&&r.period===period))||
          Object.values(DB.subAssignments).flat().some(s=>s.day===absence.day&&s.period===period&&s.absentTeacherId===absence.teacherId);
        const hasLesson=cell.lessonPlan&&Object.values(cell.lessonPlan).some(v=>v&&v.trim());

        return `<div class="card" style="${alreadyDispatched?'opacity:.6;':''}border-left:3px solid var(--red);">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
            <div>
              <div class="card-title">${abTeacher.name}</div>
              <div class="card-sub">${absence.day} · Period ${period} (${PERIOD_TIMES[period-1]})</div>
              <div class="card-sub">${cell.type==='own'?cell.class+' — '+cell.subject+' · Rm '+cell.room:'Free period'}</div>
              <div style="font-size:11.5px;margin-top:4px;color:${hasLesson?'var(--green)':'var(--orange)'};">${hasLesson?'✅ Lesson plan attached':'⚠ No lesson plan — teacher did not attach one'}</div>
            </div>
            ${alreadyDispatched?'<span class="badge badge-approved">Dispatched</span>':'<span class="badge badge-pending">Needs sub</span>'}
          </div>
          ${!alreadyDispatched?`
            <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;">Free teachers (${freeList.length}) — sorted by subject match &amp; load:</div>
            ${freeList.length===0?'<div style="font-size:12px;color:var(--red);">No teachers available for this slot.</div>':
              freeList.map(ft=>{
                const m=matchScore(ft,cell.type==='own'?cell.subject:'');
                const load=mySubCount(ft.id);
                return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--bg);border-radius:8px;margin-bottom:6px;">
                  <div>
                    <div style="font-size:13px;font-weight:600;">${ft.name}</div>
                    <div style="font-size:11.5px;color:var(--text2);">${ft.subject} · ${load} sub${load!==1?'s':''} so far</div>
                  </div>
                  <div style="display:flex;align-items:center;gap:8px;">
                    <span class="match-score ${m.cls}">${m.label}</span>
                    <button class="btn btn-primary btn-sm" data-action="dispatchSub"
                      data-absent-id="${absence.teacherId}"
                      data-sub-id="${ft.id}"
                      data-day="${absence.day}"
                      data-period="${period}"
                      data-class="${cell.type==='own'?cell.class:'N/A'}"
                      data-subject="${cell.type==='own'?cell.subject:'N/A'}"
                      data-room="${cell.type==='own'?cell.room:'N/A'}">Page →</button>
                  </div>
                </div>`;
              }).join('')}
          `:'<div style="font-size:12px;color:var(--text3);">Sub already dispatched.</div>'}
        </div>`;
      })
    ).join('')}`;
}

//  ADMIN — IMPORT TIMETABLE (CSV)
// ═══════════════════════════════════

    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;">CSV format:</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:14px;">
        Each row: <code style="background:var(--bg);padding:2px 6px;border-radius:4px;">TeacherName,Day,Period,Type,Class,Subject,Room</code><br>
        Type is <code style="background:var(--bg);padding:2px 6px;border-radius:4px;">own</code> or <code style="background:var(--bg);padding:2px 6px;border-radius:4px;">free</code><br>
        For free periods, Class/Subject/Room can be left blank.

      <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;">Example:</div>

      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" id="importBtn">Import CSV</button>
        <button class="btn btn-outline" id="clearImportBtn">Clear</button>
      </div>
      <div id="importResult" style="margin-top:12px;font-size:13px;"></div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px;">Add a new teacher manually</div>
      <div class="field"><label>Full name</label><input type="text" id="newTeacherName" placeholder="e.g. Mr. Hassan Ali"></div>
      <div class="field"><label>Subject</label><input type="text" id="newTeacherSubject" placeholder="e.g. Chemistry"></div>

// ═══════════════════════════════════
//  MODALS
// ═══════════════════════════════════
function attachModal(){
  const {type,data}=S.modal;
  let html='';

  if(type==='editLesson'){
    const cell=getCell(data.tid,data.day,data.period);
    const plan=cell.lessonPlan||{};
    html=`
      <div class="modal-title">Lesson Plan — ${cell.subject}</div>
      <div class="modal-sub">${data.day} · Period ${data.period} (${PERIOD_TIMES[data.period-1]}) · ${cell.class} · Room ${cell.room}</div>
      <div class="lesson-field"><label>What should students do?</label><textarea id="mLessonTasks" placeholder="Tasks, page numbers, activities...">${plan.tasks||''}</textarea></div>
      <div class="lesson-field"><label>Materials needed</label><input type="text" id="mLessonMaterials" placeholder="e.g. Textbook p.45, worksheets on desk..." value="${plan.materials||''}"></div>
      <div class="lesson-field"><label>Homework / what to collect</label><input type="text" id="mLessonHW" placeholder="e.g. Collect exit tickets at end" value="${plan.homework||''}"></div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px;">The sub assigned to your class will see exactly this.</div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="mClose">Cancel</button>
        <button class="btn btn-primary" id="mSaveLesson" data-day="${data.day}" data-period="${data.period}" data-tid="${data.tid}">Save Lesson Plan</button>
      </div>`;
  }

  if(type==='viewSubLesson'){
    const subs=DB.subAssignments[data.tid]||[];
    const s=subs.find(x=>x.day===data.day&&x.period===Number(data.period));
    const plan=s?.lessonPlan||null;
    html=`
      <div class="modal-title">${s?s.subject+' — '+s.class:'Lesson Plan'}</div>
      <div class="modal-sub">${data.day} · Period ${data.period} (${PERIOD_TIMES[data.period-1]})${s?' · Room '+s.room:''}</div>
      ${s?`<div style="font-size:12.5px;color:var(--text2);margin-bottom:10px;">Left by: ${s.absentTeacher}</div>`:''}
      ${plan?`
        <div style="background:var(--bg);border-radius:10px;padding:14px;">
          ${plan.tasks?`<div style="margin-bottom:10px;"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);margin-bottom:4px;">Tasks</div><div style="font-size:14px;line-height:1.65;">${plan.tasks}</div></div>`:''}
          ${plan.materials?`<div style="margin-bottom:10px;"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);margin-bottom:4px;">Materials</div><div style="font-size:14px;">${plan.materials}</div></div>`:''}
          ${plan.homework?`<div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);margin-bottom:4px;">Collect / Homework</div><div style="font-size:14px;">${plan.homework}</div></div>`:''}
        </div>
      `:'<div style="background:var(--orangeBg);border-radius:8px;padding:12px;font-size:13px;color:var(--orange);">⚠ No lesson plan was attached by the absent teacher. Please check with admin or the teacher directly.</div>'}
      <div class="modal-actions"><button class="btn btn-outline" id="mClose">Close</button></div>`;
  }

  if(type==='teacherTimetable'){
    const t=teacher(data.tid);
    html=`
      <div class="modal-title">${t.name}</div>
      <div class="modal-sub">${t.subject} · Full weekly schedule · Sub count: ${mySubCount(data.tid)}</div>
      ${renderTimetable(data.tid,false)}
      <div class="modal-actions"><button class="btn btn-outline" id="mClose">Close</button></div>`;
  }

  if(type==='dispatchConfirm'){
    html=`
      <div class="modal-title">Sub paged ✓</div>
      <div class="modal-sub">${data.subName} has been sent a sub request for ${data.day} Period ${data.period}.</div>
      <div class="card" style="margin:0;">
        <div class="card-sub">Covering: ${data.absentName}</div>
        <div class="card-sub">Class: ${data.className} — ${data.subject}</div>
        <div class="card-sub">Room: ${data.room}</div>
      </div>
      <div class="modal-actions"><button class="btn btn-primary" id="mClose">Done</button></div>`;
  }

  const ov=document.createElement('div');
  ov.className='modal-overlay';ov.id='mOverlay';
  ov.innerHTML=`<div class="modal">${html}</div>`;
  document.getElementById('app').appendChild(ov);

  document.getElementById('mClose')?.addEventListener('click',closeModal);
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});

  document.getElementById('mSaveLesson')?.addEventListener('click',e=>{
    const {day,period,tid}=e.target.dataset;
    const cell=getCell(Number(tid),day,Number(period));
    if(cell.type==='own'){
      cell.lessonPlan={
        tasks:document.getElementById('mLessonTasks').value.trim(),
        materials:document.getElementById('mLessonMaterials').value.trim(),
        homework:document.getElementById('mLessonHW').value.trim(),
      };
      save();
      toast('Lesson plan saved ✓','success');
      closeModal();
    }
  });
}

// ═══════════════════════════════════
//  FORM BINDINGS
// ═══════════════════════════════════
function bindForms(){
  // Absence day
  const absDay=document.getElementById('absDay');
  if(absDay) absDay.onchange=e=>{S.absDay=e.target.value;S.lessonDraft={};render();};

  // Absence period checkboxes
  document.querySelectorAll('.abs-pcheck').forEach(cb=>{
    cb.parentElement.onclick=()=>{
      const p=Number(cb.value);
      S.absPeriods=S.absPeriods.includes(p)?S.absPeriods.filter(x=>x!==p):[...S.absPeriods,p].sort((a,b)=>a-b);
      render();
    };
  });

  // Lesson plan draft inputs (live)
  document.querySelectorAll('.lesson-tasks').forEach(el=>{
    el.oninput=e=>{const p=Number(e.target.dataset.p);S.lessonDraft[p]={...S.lessonDraft[p]||{},tasks:e.target.value};};
  });
  document.querySelectorAll('.lesson-materials').forEach(el=>{
    el.oninput=e=>{const p=Number(e.target.dataset.p);S.lessonDraft[p]={...S.lessonDraft[p]||{},materials:e.target.value};};
  });
  document.querySelectorAll('.lesson-hw').forEach(el=>{
    el.oninput=e=>{const p=Number(e.target.dataset.p);S.lessonDraft[p]={...S.lessonDraft[p]||{},homework:e.target.value};};
  });

  // Submit absence
  document.getElementById('submitAbsence')?.addEventListener('click',()=>{
    const reason=document.getElementById('absReason')?.value.trim();
    if(!S.absPeriods.length){toast('Select at least one period','error');return;}
    if(!reason){toast('Add a reason','error');return;}

    // Save lesson plan drafts to timetable
    let hasAnyPlan=false;
    S.absPeriods.forEach(p=>{
      const cell=getCell(S.teacherId,S.absDay,p);
      if(cell.type==='own'&&S.lessonDraft[p]){
        cell.lessonPlan={...S.lessonDraft[p]};
        if(S.lessonDraft[p].tasks&&S.lessonDraft[p].tasks.trim()) hasAnyPlan=true;
      }
    });

    DB.absenceRequests.push({
      id:DB.absenceIdCounter++,
      teacherId:S.teacherId,
      teacherName:me().name,
      reason,
      status:'pending',
      periods:[...S.absPeriods],
      day:S.absDay,
      lessonPlansAttached:hasAnyPlan,
    });
    S.absPeriods=[];S.absReason='';S.lessonDraft={};
    save();
    toast('Absence submitted for admin approval','success');
    render();
  });

  // Absence reason live
  const absReason=document.getElementById('absReason');
  if(absReason) absReason.oninput=e=>S.absReason=e.target.value;

  // Import CSV
  document.getElementById('csvInput')?.addEventListener('input',e=>S.csvText=e.target.value);
  document.getElementById('importBtn')?.addEventListener('click',()=>{
    const lines=S.csvText.trim().split('\n').filter(l=>l.trim());
    let ok=0,errors=[];
    lines.forEach((line,i)=>{
      const [tName,day,period,type,cls,subject,room]=line.split(',').map(s=>s.trim());
      const t=DB.teachers.find(x=>x.name===tName);
      if(!t){errors.push(`Row ${i+1}: Teacher "${tName}" not found`);return;}
      if(!DAYS.includes(day)){errors.push(`Row ${i+1}: Invalid day "${day}"`);return;}
      const p=Number(period);
      if(!PERIODS.includes(p)){errors.push(`Row ${i+1}: Invalid period "${period}"`);return;}
      if(!DB.timetable[t.id]) DB.timetable[t.id]={};
      if(!DB.timetable[t.id][day]) DB.timetable[t.id][day]={};
      if(type==='own'){
        DB.timetable[t.id][day][p]={type:'own',class:cls||'',subject:subject||t.subject,room:room||'',lessonPlan:null};
      } else {
        DB.timetable[t.id][day][p]={type:'free'};
      }
      ok++;
    });
    save();
    const res=document.getElementById('importResult');
    if(res){
      res.innerHTML=`<div style="color:var(--green);font-weight:600;">✓ ${ok} rows imported</div>${errors.map(e=>`<div style="color:var(--red);font-size:12px;margin-top:4px;">• ${e}</div>`).join('')}`;
    }
    toast(`Imported ${ok} rows`,'success');
  });
  document.getElementById('clearImportBtn')?.addEventListener('click',()=>{S.csvText='';render();});

  // Add teacher
  document.getElementById('addTeacherBtn')?.addEventListener('click',()=>{
    const name=document.getElementById('newTeacherName')?.value.trim();
    const subject=document.getElementById('newTeacherSubject')?.value.trim();
    if(!name||!subject){toast('Fill in name and subject','error');return;}
    const newId=Math.max(...DB.teachers.map(t=>t.id))+1;
    const colors=['#2563eb','#7c3aed','#0891b2','#059669','#d97706','#db2777','#65a30d','#ea580c'];
    DB.teachers.push({id:newId,name,subject,color:colors[newId%colors.length]});
    DB.timetable[newId]={};
    DAYS.forEach(d=>{DB.timetable[newId][d]={};PERIODS.forEach(p=>{DB.timetable[newId][d][p]={type:'free'};});});
    save();
    toast(`${name} added`,'success');
    render();
  });
}

// ═══════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════
function handleAction(action,data,el){
  if(action==='editLesson'){
    S.modal={type:'editLesson',data:{day:data.day,period:Number(data.period),tid:Number(data.tid)}};
    render();
  }
  if(action==='viewSubLesson'){
    S.modal={type:'viewSubLesson',data:{day:data.day,period:Number(data.period),tid:Number(data.tid)}};
    render();
  }
  if(action==='viewTeacherTimetable'){
    S.modal={type:'teacherTimetable',data:{tid:Number(data.tid)}};
    render();
  }
  if(action==='approveAbsence'){
    const r=DB.absenceRequests.find(x=>x.id===Number(data.rid));
    if(r){r.status='approved';save();toast(`Approved: ${r.teacherName}`,'success');render();}
  }
  if(action==='rejectAbsence'){
    const r=DB.absenceRequests.find(x=>x.id===Number(data.rid));
    if(r){r.status='rejected';save();toast(`Rejected: ${r.teacherName}`);render();}
  }
  if(action==='acceptSub'){
    const rid=Number(data.rid);
    let found=null;
    Object.entries(DB.subRequests).forEach(([tid,reqs])=>{
      const req=reqs.find(r=>r.id===rid);
      if(req) found={req,tid:Number(tid)};
    });
    if(found){
      found.req.status='accepted';
      if(!DB.subAssignments[S.teacherId]) DB.subAssignments[S.teacherId]=[];
      DB.subAssignments[S.teacherId].push({
        id:'sa'+DB.subAssignIdCounter++,
        day:found.req.day,period:found.req.period,
        absentTeacherId:found.req.absentTeacherId||0,
        absentTeacher:found.req.absentTeacher,
        class:found.req.class,subject:found.req.subject,room:found.req.room,
        confirmed:false,lessonPlan:found.req.lessonPlan||null,
      });
      DB.subRequests[S.teacherId]=(DB.subRequests[S.teacherId]||[]).filter(r=>r.id!==rid);
      save();toast('Sub accepted ✓','success');render();
    }
  }
  if(action==='declineSub'){
    const rid=Number(data.rid);
    Object.values(DB.subRequests).forEach(reqs=>{
      const i=reqs.findIndex(r=>r.id===rid);
      if(i>=0) reqs.splice(i,1);
    });
    save();toast('Declined');render();
  }
  if(action==='confirmCovered'){
    const tid=Number(data.tid);
    const saId=data.saId;
    const subs=DB.subAssignments[tid]||[];
    const s=subs.find(x=>x.id===saId);
    if(s){s.confirmed=true;save();toast('Marked as covered ✓','success');render();}
  }
  if(action==='dispatchSub'){
    const subTeacher=teacher(Number(data.subId));
    const abTeacher=teacher(Number(data.absentId));
    const cell=getCell(Number(data.absentId),data.day,Number(data.period));
    const lessonPlan=cell.lessonPlan||null;
    if(!DB.subRequests[data.subId]) DB.subRequests[data.subId]=[];
    DB.subRequests[data.subId].push({
      id:DB.subReqIdCounter++,
      day:data.day,period:Number(data.period),
      absentTeacherId:Number(data.absentId),
      absentTeacher:abTeacher.name,
      class:data.class,subject:data.subject,room:data.room,
      status:'pending',lessonPlan,
    });
    save();
    S.modal={type:'dispatchConfirm',data:{subName:subTeacher.name,absentName:abTeacher.name,day:data.day,period:Number(data.period),className:data.class,subject:data.subject,room:data.room}};
    render();
  }
}

render();
</script>
